<svg width="680" height="920" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <title>Arquitectura — Agente RAG Gastronomía Colombiana</title>
  <desc>Diagrama estructural con capas: usuario, frontend React, backend FastAPI, agente LangGraph, Ollama, PostgreSQL+pgvector y servicios AWS</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- Color tokens -->
    <!-- gray: fill #F1EFE8, stroke #5F5E5A, text #444441 -->
    <!-- blue: fill #E6F1FB, stroke #185FA5, text #0C447C -->
    <!-- purple: fill #EEEDFE, stroke #534AB7, text #3C3489 -->
    <!-- amber: fill #FAEEDA, stroke #BA7517, text #633806 -->
    <!-- teal: fill #E1F5EE, stroke #0F6E56, text #085041 -->
    <!-- coral: fill #FAECE7, stroke #993C1D, text #712B13 -->
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="680" height="920" fill="#ffffff"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- USUARIO                                    -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="270" y="20" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#444441">Usuario (browser)</text>

  <!-- Flecha usuario → frontend -->
  <line x1="340" y1="64" x2="340" y2="100" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- FRONTEND — React SPA (S3 + CloudFront)    -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="60" y="100" width="560" height="100" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="122" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#0C447C">Frontend — React SPA (S3 + CloudFront)</text>

  <!-- Auth -->
  <rect x="82" y="136" width="152" height="48" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="158" y="154" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#0C447C">Auth (Cognito PKCE)</text>
  <text x="158" y="170" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#185FA5">Login / Callback</text>

  <!-- Chat UI -->
  <rect x="256" y="136" width="152" height="48" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="332" y="154" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#0C447C">Chat UI</text>
  <text x="332" y="170" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#185FA5">Mensajes + fuentes</text>

  <!-- Documentos UI -->
  <rect x="430" y="136" width="172" height="48" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="516" y="154" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#0C447C">Documentos UI</text>
  <text x="516" y="170" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#185FA5">Upload + polling status</text>

  <!-- Flechas frontend → externos -->
  <line x1="158" y1="200" x2="90" y2="258" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="200" x2="340" y2="258" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="516" y1="200" x2="590" y2="258" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- AWS COGNITO (externo)                      -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="32" y="258" width="130" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="97" y="276" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">AWS Cognito</text>
  <text x="97" y="292" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0F6E56">JWT / ID token</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- AWS S3 (documentos)                        -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="516" y="258" width="130" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="581" y="276" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">AWS S3</text>
  <text x="581" y="292" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0F6E56">Archivos de docs</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- BACKEND FastAPI (EC2)                      -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="160" y="258" width="340" height="200" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="330" y="280" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">Backend — FastAPI (EC2)</text>

  <!-- Auth middleware -->
  <rect x="178" y="296" width="148" height="44" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="252" y="314" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">Auth middleware</text>
  <text x="252" y="330" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534AB7">Valida JWT Cognito</text>

  <!-- Document service -->
  <rect x="340" y="296" width="148" height="44" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="414" y="314" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">Document service</text>
  <text x="414" y="330" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534AB7">Extract → chunk → embed</text>

  <!-- Chat service -->
  <rect x="178" y="358" width="148" height="44" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="252" y="376" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">Chat service</text>
  <text x="252" y="392" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534AB7">Orquesta el agente</text>

  <!-- Embedding service -->
  <rect x="340" y="358" width="148" height="44" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="414" y="376" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">Embedding service</text>
  <text x="414" y="392" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534AB7">multilingual-e5-small</text>

  <!-- Flecha backend → agente -->
  <line x1="330" y1="458" x2="330" y2="500" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- AGENTE LANGGRAPH (6 nodos)                 -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="80" y="500" width="500" height="220" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="330" y="522" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#633806">Agente LangGraph (6 nodos)</text>

  <!-- Nodo 1: receive_question -->
  <rect x="100" y="540" width="130" height="44" rx="6" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="165" y="558" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#633806">receive_question</text>
  <text x="165" y="574" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854F0B">Normaliza entrada</text>

  <!-- Nodo 2: retrieve_context -->
  <rect x="260" y="540" width="130" height="44" rx="6" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="325" y="558" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#633806">retrieve_context</text>
  <text x="325" y="574" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854F0B">Busca en pgvector</text>

  <!-- Nodo 3: evaluate_relevance -->
  <rect x="420" y="540" width="140" height="44" rx="6" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="490" y="558" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#633806">evaluate_relevance</text>
  <text x="490" y="574" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854F0B">Umbral similitud 0.70</text>

  <!-- Flechas nodos 1→2→3 -->
  <line x1="230" y1="562" x2="258" y2="562" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="390" y1="562" x2="418" y2="562" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Nodo 4: generate_answer -->
  <rect x="170" y="624" width="130" height="44" rx="6" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="235" y="642" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#633806">generate_answer</text>
  <text x="235" y="658" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854F0B">LLM + historial</text>

  <!-- Nodo 5: reject_question -->
  <rect x="420" y="624" width="130" height="44" rx="6" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="485" y="642" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#633806">reject_question</text>
  <text x="485" y="658" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854F0B">Respuesta canónica</text>

  <!-- Aristas condicionales desde evaluate_relevance -->
  <path d="M490 584 L490 610 L485 610 L485 622" fill="none" stroke="#BA7517" stroke-width="1" opacity="0.7" marker-end="url(#arrow)"/>
  <path d="M490 584 L490 610 L235 610 L235 622" fill="none" stroke="#BA7517" stroke-width="1" opacity="0.7" marker-end="url(#arrow)"/>
  <text x="350" y="606" text-anchor="middle" font-size="11" fill="#854F0B">sí / no</text>

  <!-- Nodo 6: save_history -->
  <rect x="260" y="694" width="130" height="44" rx="6" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="325" y="712" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#633806">save_history</text>
  <text x="325" y="728" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854F0B">Persiste en BD</text>

  <!-- Flechas hacia save_history -->
  <path d="M235 668 L235 738 L258 738" fill="none" stroke="#BA7517" stroke-width="1" opacity="0.7" marker-end="url(#arrow)"/>
  <path d="M485 668 L485 738 L392 738" fill="none" stroke="#BA7517" stroke-width="1" opacity="0.7" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- CAPA INFERIOR: Ollama y PostgreSQL+pgvec   -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Flechas agente → servicios IA/BD -->
  <line x1="200" y1="720" x2="122" y2="800" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="390" y1="744" x2="390" y2="800" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Flecha retrieve_context → pgvector (línea punteada) -->
  <path d="M325 584 L325 760 L390 760 L390 798" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Ollama -->
  <rect x="32" y="800" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="122" y="820" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#712B13">Ollama (EC2)</text>
  <text x="122" y="838" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#993C1D">Llama 3.2 3B · temp 0.2</text>

  <!-- PostgreSQL + pgvector -->
  <rect x="280" y="800" width="220" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="390" y="820" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#712B13">PostgreSQL + pgvector</text>
  <text x="390" y="838" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#993C1D">Vector dim 384 · similitud coseno</text>

  <!-- AWS RDS label (solo texto) -->
  <text x="540" y="820" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">(AWS RDS en prod)</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- LEYENDA                                    -->
  <!-- ══════════════════════════════════════════ -->
  <line x1="60" y1="874" x2="620" y2="874" stroke="#D3D1C7" stroke-width="0.5"/>

  <rect x="60"  y="882" width="12" height="12" rx="2" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="78"  y="888" dominant-baseline="central" font-size="11" fill="#444441">Frontend</text>

  <rect x="160" y="882" width="12" height="12" rx="2" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="178" y="888" dominant-baseline="central" font-size="11" fill="#444441">Backend</text>

  <rect x="264" y="882" width="12" height="12" rx="2" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="282" y="888" dominant-baseline="central" font-size="11" fill="#444441">Agente LangGraph</text>

  <rect x="416" y="882" width="12" height="12" rx="2" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="434" y="888" dominant-baseline="central" font-size="11" fill="#444441">AWS (externo)</text>

  <rect x="544" y="882" width="12" height="12" rx="2" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text x="562" y="888" dominant-baseline="central" font-size="11" fill="#444441">IA / BD</text>

  <!-- Título y versión -->
  <text x="340" y="908" text-anchor="middle" font-size="10" fill="#B4B2A9">Agente RAG Gastronomía Colombiana · Milestone 7 · arquitectura.svg</text>
</svg>
