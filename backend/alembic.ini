[alembic]
# Ruta de los scripts de migración (relativa a este archivo)
script_location = db/migrations

# Asegura que `from db.base import Base` funcione desde env.py
prepend_sys_path = .

# Separador en versionado de paths
version_path_separator = os

# Formato de los nombres de archivo de migración
# %(rev)s = ID generado, %(slug)s = nombre humanizado
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# La URL se inyecta en env.py desde la variable de entorno DATABASE_URL.
# Aquí queda vacía a propósito.
sqlalchemy.url =


# ============================================================
# Logging
# ============================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
