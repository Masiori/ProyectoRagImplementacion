services:
  # ============================================================
  # PostgreSQL 16 con extensión pgvector
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agente-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agente_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agente_password}
      POSTGRES_DB: ${POSTGRES_DB:-agente_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-agente_user} -d ${POSTGRES_DB:-agente_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agente-net

  # ============================================================
  # Ollama - LLM local
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: agente-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      OLLAMA_MODEL: llama3.2:3b
    command: >
      sh -c '
        ollama serve >/tmp/ollama.log 2>&1 &
        pid=$$!
        until ollama list >/dev/null 2>&1; do
          sleep 1
        done
        if ! ollama list | grep -Fq "$OLLAMA_MODEL"; then
          ollama pull "$OLLAMA_MODEL"
        fi
        wait $$pid
      '
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agente-net

  # ============================================================
  # Backend FastAPI
  # Milestone 4: nuevo volumen `huggingface_cache` para los pesos
  # del modelo de embeddings (~120 MB), persistidos entre rebuilds.
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agente-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agente_user}:${POSTGRES_PASSWORD:-agente_password}@postgres:5432/${POSTGRES_DB:-agente_db}
      OLLAMA_BASE_URL: http://ollama:11434
      # Apuntamos HuggingFace al volumen persistente
      HF_HOME: /root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./backend:/app
      - huggingface_cache:/root/.cache/huggingface
    networks:
      - agente-net

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
  huggingface_cache:
    driver: local

networks:
  agente-net:
    driver: bridge
